version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: payg
      # MYSQL_USER: 
      # MYSQL_PASSWORD: 
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - payg-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - payg-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - payg-net

  redis:
    image: redis:7
    container_name: redis-cache
    restart: always
    ports: 
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - payg-net

  # payg-service:
  #   build: .
  #   container_name: payg-service
  #   depends_on:
  #     - mysql
  #     - kafka
  #     - redis
  #   ports:
  #     - "7070:7070"
  #   environment:
  #     - SPRING_PROFILES_ACTIVE=docker
  #     - GATEWAY_URL=http://payg-service:7070
  #     - PAYG_URL=http://payg-service:7070

  #   networks:
  #     - payg-net

volumes:
  mysql-data:
  redis-data:

networks:
  payg-net:
    driver: bridge
